server:
  port: 8081

spring:
  application:
    name: web-crawler-service

  datasource:
    url: jdbc:postgresql://localhost:5433/webcrawler
    username: webcrawler
    password: webcrawler
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

springdoc:
  swagger-ui:
    path: /swagger-ui.html
