version: "3.9"

# Rate Limiter only needs Redis — the simplest infra of all 17 projects.
# Start: docker-compose up -d
# Stop:  docker-compose down

services:
  redis:
    image: redis:7.2-alpine
    container_name: ratelimiter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    # --save 60 1: persist to disk if at least 1 key changes in 60s
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis Commander: browser UI to inspect keys at http://localhost:8082
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: ratelimiter-redis-ui
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
